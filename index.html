<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aranha TRADES</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: url('https://images6.alphacoders.com/134/1347380.jpeg') no-repeat center center/cover;
  color: white;
  overflow: hidden;
}

/* overlay leve */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* partículas */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* teia */
.web {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 120px;
  background: white;
}

/* título */
.logo {
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 42px;
  font-weight: bold;
  text-shadow: 0 0 20px red;
  animation: cair 2s forwards;
}

@keyframes cair {
  to { top: 80px; }
}

/* conteúdo */
.container {
  position: relative;
  top: 200px;
  text-align: center;
  z-index: 2;
}

.btn {
  background: linear-gradient(45deg, #25D366, #128C7E);
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  display: inline-block;
  margin: 10px;
}

.btn:hover {
  transform: scale(1.1);
}

/* botão som */
.sound-btn {
  background: red;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="web"></div>
<div class="logo">🕷️ Aranha TRADES</div>

<div class="container">
  <h2>Venda ou troque sua conta com segurança</h2>

  <a class="btn" href="https://wa.me/5512991439382?text=Olá%20gostaria%20de%20trocar%20ou%20vender%20minha%20conta" target="_blank">
    Entrar em contato
  </a>

  <br>

  <button class="btn sound-btn" onclick="tocarSom()">🔊 Ativar som</button>
</div>

<audio id="som" loop>
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
function criarParticula() {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
  }, 8000);
}

setInterval(criarParticula, 200);

function tocarSom() {
  document.getElementById("som").play();
}
</script>

</body>
</html>
