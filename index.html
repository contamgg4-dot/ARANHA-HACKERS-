<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Site Profissional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* MENU */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    header h1 {
      color: #00f2ff;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00f2ff;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    .hero h2 {
      font-size: 3rem;
      background: linear-gradient(90deg, #00f2ff, #a100ff);
      -webkit-background-clip: text;
      color: transparent;
      animation: fadeIn 2s ease-in-out;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.7;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: linear-gradient(90deg, #00f2ff, #a100ff);
      color: #000;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00f2ff;
    }

    /* SEÇÕES */
    section {
      padding: 80px 20px;
      text-align: center;
    }

    /* ANIMAÇÃO */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* PARTICULAS */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* RESPONSIVO */
    @media(max-width: 768px){
      .hero h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

<!-- FUNDO -->
<div id="particles-js"></div>

<!-- MENU -->
<header>
  <h1>DEX</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#sobre">Sobre</a>
    <a href="#contato">Contato</a>
  </nav>
</header>

<!-- HOME -->
<div class="hero" id="home">
  <h2>Site Moderno & Profissional</h2>
  <p>Design tecnológico com animações</p>
  <a class="btn" href="https://wa.me/5512991439382" target="_blank">Fale no WhatsApp</a>
</div>

<!-- SOBRE -->
<section id="sobre">
  <h2>Sobre</h2>
  <p>Este é um site moderno criado com HTML, CSS e JavaScript com efeitos profissionais.</p>
</section>

<!-- CONTATO -->
<section id="contato">
  <h2>Contato</h2>
  <p>Clique abaixo para falar direto comigo:</p>
  <a class="btn" href="https://wa.me/5512991439382" target="_blank">WhatsApp</a>
</section>

<!-- SCRIPT PARTICULAS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 80 },
    "color": { "value": "#00f2ff" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.5 },
    "size": { "value": 3 },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#00f2ff",
      "opacity": 0.4,
      "width": 1
    },
    "move": { "enable": true, "speed": 3 }
  }
});
</script>

</body>
</html>
